<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060b14;stop-opacity:1" />
    </linearGradient>

    <!-- Name text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff" />
      <stop offset="50%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline animation clip -->
    <clipPath id="mainClip">
      <rect width="900" height="220"/>
    </clipPath>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#00d4ff" opacity="0.08"/>
    </pattern>

    <!-- Corner fade mask -->
    <radialGradient id="spotlightGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#0d2040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#060b14;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- Spotlight layer -->
  <rect width="900" height="220" fill="url(#spotlightGrad)" opacity="0.6"/>

  <!-- Dot grid -->
  <rect width="900" height="220" fill="url(#dots)"/>

  <!-- Horizontal rule lines (subtle) -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#00d4ff" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="180" x2="900" y2="180" stroke="#00d4ff" stroke-width="0.3" opacity="0.12"/>

  <!-- Left vertical accent bar -->
  <rect x="42" y="50" width="2" height="120" fill="#00d4ff" opacity="0.5" rx="1"/>
  <circle cx="43" cy="50" r="3" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="43" cy="110" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="43" cy="170" r="3" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Right vertical accent bar -->
  <rect x="856" y="50" width="2" height="120" fill="#6366f1" opacity="0.5" rx="1"/>
  <circle cx="857" cy="50" r="3" fill="#6366f1" opacity="0.9" filter="url(#glow)"/>
  <circle cx="857" cy="110" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="857" cy="170" r="3" fill="#6366f1" opacity="0.9" filter="url(#glow)"/>

  <!-- Top left corner bracket -->
  <path d="M 68 60 L 58 60 L 58 70" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Top right corner bracket -->
  <path d="M 832 60 L 842 60 L 842 70" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Bottom left corner bracket -->
  <path d="M 68 160 L 58 160 L 58 150" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Bottom right corner bracket -->
  <path d="M 832 160 L 842 160 L 842 150" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Decorative top tags -->
  <text x="68" y="56" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.45">&lt;dev/&gt;</text>
  <text x="795" y="56" font-family="'Courier New', monospace" font-size="9" fill="#6366f1" opacity="0.45">class of 2026</text>

  <!-- Glowing underline behind main name -->
  <rect x="190" y="113" width="520" height="4" rx="2" fill="#00d4ff" opacity="0.15" filter="url(#strongGlow)"/>

  <!-- Main name: shadow layer -->
  <text x="450" y="112"
    font-family="'Trebuchet MS', 'Arial Black', sans-serif"
    font-size="60"
    font-weight="900"
    letter-spacing="8"
    text-anchor="middle"
    fill="#001830"
    opacity="0.8">JUSTIN TITUS J</text>

  <!-- Main name: gradient text -->
  <text x="450" y="110"
    font-family="'Trebuchet MS', 'Arial Black', sans-serif"
    font-size="60"
    font-weight="900"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#nameGrad)"
    filter="url(#glow)">JUSTIN TITUS J</text>

  <!-- Animated shimmer line over name -->
  <rect x="0" y="62" width="900" height="58" fill="url(#bgGrad)" opacity="0">
    <animate attributeName="opacity"
      values="0;0.06;0;0"
      dur="4s"
      repeatCount="indefinite"
      begin="1s"/>
    <animate attributeName="y"
      values="62;62;130;130"
      dur="4s"
      repeatCount="indefinite"
      begin="1s"/>
  </rect>

  <!-- Thin line under name -->
  <line x1="220" y1="120" x2="680" y2="120" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>

  <!-- Role subtitle -->
  <text x="450" y="148"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="3"
    text-anchor="middle"
    fill="#8899bb"
    opacity="0.9">FULL-STACK DEVELOPER  ·  AI BUILDER  ·  SYSTEM ARCHITECT</text>

  <!-- Status dots row -->
  <!-- React -->
  <circle cx="314" cy="174" r="3.5" fill="#61dafb" opacity="0.85"/>
  <text x="322" y="178" font-family="'Courier New', monospace" font-size="10" fill="#607090">React</text>

  <!-- Next.js -->
  <circle cx="371" cy="174" r="3.5" fill="#ffffff" opacity="0.7"/>
  <text x="379" y="178" font-family="'Courier New', monospace" font-size="10" fill="#607090">Next.js</text>

  <!-- FastAPI -->
  <circle cx="434" cy="174" r="3.5" fill="#009688" opacity="0.85"/>
  <text x="442" y="178" font-family="'Courier New', monospace" font-size="10" fill="#607090">FastAPI</text>

  <!-- TypeScript -->
  <circle cx="499" cy="174" r="3.5" fill="#3178c6" opacity="0.85"/>
  <text x="507" y="178" font-family="'Courier New', monospace" font-size="10" fill="#607090">TypeScript</text>

  <!-- AI/ML -->
  <circle cx="574" cy="174" r="3.5" fill="#6366f1" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.3;0.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="582" y="178" font-family="'Courier New', monospace" font-size="10" fill="#607090">AI / ML</text>

  <!-- Bottom label -->
  <text x="450" y="207"
    font-family="'Courier New', monospace"
    font-size="9"
    letter-spacing="2"
    text-anchor="middle"
    fill="#2d4060"
    opacity="0.8">JEPPIAAR ENGINEERING COLLEGE  ·  ANNA UNIVERSITY  ·  2026</text>
</svg>
